version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - goconst
    - gocyclo
    - govet
    - misspell
    - revive
    - staticcheck
  settings:
    gocyclo:
      min-complexity: 10
    goconst:
      min-len: 3
      min-occurrences: 3

formatters:
  enable:
    - gofmt
